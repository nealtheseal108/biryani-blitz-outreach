<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biryani Blitz — Outreach Dashboard</title>
<link rel="stylesheet" href="/css/theme.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --glass-bg: var(--glass-surface);
    --glass-hover: rgba(255, 255, 255, 0.18);
    --accent: #ff7c38;
    --accent-soft: rgba(255, 124, 56, 0.18);
    --text-primary: rgba(255, 255, 255, 0.94);
    --text-secondary: rgba(255, 255, 255, 0.52);
    --text-muted: rgba(255, 255, 255, 0.35);
    --bg-1: #0a0c12;
    --radius: 14px;
    --radius-sm: 8px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font);
    background: var(--bg-1);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 85% 65% at 12% 18%, rgba(255, 95, 45, 0.42), transparent 58%),
      radial-gradient(ellipse 70% 55% at 88% 12%, rgba(210, 55, 95, 0.32), transparent 52%),
      radial-gradient(ellipse 75% 70% at 92% 88%, rgba(55, 35, 120, 0.45), transparent 55%),
      radial-gradient(ellipse 55% 45% at 45% 92%, rgba(255, 150, 70, 0.2), transparent 50%),
      var(--bg-1);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; max-width: 1320px; margin: 0 auto; padding: 0 2rem 4rem; }

  header {
    padding: 3rem 0 2rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
    border-bottom: 0.5px solid var(--glass-border);
    margin-bottom: 2rem;
  }

  .brand { display: flex; align-items: center; gap: 14px; }
  .build-tag {
    font-family: var(--font-cno);
    font-style: italic;
    font-size: 0.64rem;
    color: #fdc99f;
    opacity: 0.85;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-left: 0.45rem;
    white-space: nowrap;
  }

  .logo-mark {
    width: 50px;
    height: 50px;
    border-radius: 999px;
    border: 1px solid rgba(255, 238, 222, 0.5);
    background: #ffeede;
    object-fit: cover;
    flex-shrink: 0;
  }

  h1 {
    font-family: var(--font);
    font-size: 1.6rem;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.2;
  }

  h1 span {
    display: block;
    font-family: var(--font);
    font-size: 0.7rem;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .stats-bar {
    display: flex;
    gap: 1px;
    margin-bottom: 2rem;
    border-radius: var(--radius);
    overflow: hidden;
    border: 0.5px solid var(--glass-border);
    flex-wrap: wrap;
  }

  .stat-cell {
    flex: 1;
    min-width: 100px;
    padding: 1rem 1rem;
    background: var(--glass-bg);
    backdrop-filter: blur(var(--glass-blur));
    -webkit-backdrop-filter: blur(var(--glass-blur));
    box-shadow: var(--glass-inset);
    text-align: center;
  }

  .stat-cell:not(:last-child) { border-right: 0.5px solid var(--glass-border); }

  .stat-cell.tier-stat {
    flex: 0 1 72px;
    min-width: 56px;
    padding: 0.75rem 0.5rem;
  }

  .stat-cell.tier-stat .stat-num { font-size: 1.45rem; }
  .stat-cell.tier-stat .stat-label { font-size: 0.52rem; }

  .stat-num.stat-ratio {
    font-size: 1.5rem;
    letter-spacing: -0.03em;
    white-space: nowrap;
  }

  .stat-cell.tier-stat .stat-num.stat-ratio { font-size: 1.2rem; }

  .stat-num {
    font-family: var(--font);
    font-size: 1.75rem;
    font-weight: 400;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.58rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-top: 4px;
  }

  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
    align-items: center;
  }

  .search-wrap {
    flex: 1;
    min-width: 220px;
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 14px; height: 14px;
    opacity: 0.4;
  }

  input[type="search"], select {
    width: 100%;
    height: 38px;
    background: var(--glass-bg);
    border: 0.5px solid var(--glass-border);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    outline: none;
    padding: 0 12px;
    backdrop-filter: blur(var(--glass-blur));
    -webkit-backdrop-filter: blur(var(--glass-blur));
    box-shadow: var(--glass-inset);
    transition: border-color 0.2s;
    appearance: none;
    -webkit-appearance: none;
  }

  input[type="search"] { padding-left: 36px; }

  input[type="search"]:focus, select:focus {
    border-color: var(--accent);
    background: rgba(255,124,56,0.06);
  }

  input[type="search"]::placeholder { color: var(--text-muted); }

  select option { background: #1a1d24; color: var(--text-primary); }

  .filter-btn {
    height: 38px;
    padding: 0 16px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--glass-border);
    background: var(--glass-bg);
    color: var(--text-secondary);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    cursor: pointer;
    backdrop-filter: blur(var(--glass-blur));
    -webkit-backdrop-filter: blur(var(--glass-blur));
    box-shadow: var(--glass-inset);
    transition: all 0.18s;
    white-space: nowrap;
  }

  .filter-btn:hover { background: var(--glass-hover); color: var(--text-primary); border-color: rgba(255,255,255,0.22); }

  .filter-btn.active {
    background: var(--accent-soft);
    border-color: rgba(255,124,56,0.45);
    color: var(--accent);
  }

  .university-section {
    margin-bottom: 1.5rem;
    border-radius: var(--radius);
    overflow: hidden;
    border: 0.5px solid var(--glass-border);
    animation: fadeUp 0.3s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .university-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0.9rem 1.25rem;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(var(--glass-blur));
    -webkit-backdrop-filter: blur(var(--glass-blur));
    box-shadow: var(--glass-inset);
    cursor: pointer;
    user-select: none;
    transition: background 0.18s;
  }

  .university-header:hover { background: var(--glass-hover); }

  .uni-rank {
    font-size: 0.65rem;
    color: var(--accent);
    min-width: 28px;
    letter-spacing: 0.05em;
  }

  .uni-name {
    font-family: 'DM Serif Display', serif;
    font-size: 1.05rem;
    font-weight: 400;
    flex: 1;
  }

  .uni-city { font-size: 0.68rem; color: var(--text-secondary); letter-spacing: 0.05em; }

  .uni-count {
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 20px;
    background: var(--accent-soft);
    color: var(--accent);
    border: 0.5px solid rgba(255,124,56,0.3);
  }

  .copy-email-btn {
    border: 0.5px solid rgba(255,124,56,0.35);
    background: rgba(255,124,56,0.12);
    color: var(--accent);
    border-radius: 999px;
    font-family: var(--font);
    font-size: 0.62rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.25rem 0.55rem;
    cursor: pointer;
  }

  .copy-email-btn:hover {
    background: rgba(255,124,56,0.22);
  }

  .chevron {
    width: 14px; height: 14px;
    opacity: 0.4;
    transition: transform 0.22s;
    flex-shrink: 0;
  }

  .university-section.collapsed .chevron { transform: rotate(-90deg); }

  .contacts-wrap {
    overflow-x: auto;
    background: rgba(10,12,18,0.6);
    backdrop-filter: blur(var(--glass-blur));
    -webkit-backdrop-filter: blur(var(--glass-blur));
    box-shadow: var(--glass-inset);
  }

  .university-section.collapsed .contacts-wrap { display: none; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.72rem;
  }

  thead tr { border-bottom: 0.5px solid var(--glass-border); }

  th {
    padding: 0.6rem 0.85rem;
    text-align: left;
    font-weight: 400;
    font-size: 0.58rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    white-space: nowrap;
  }

  td {
    padding: 0.65rem 0.85rem;
    color: var(--text-secondary);
    border-bottom: 0.5px solid rgba(255,255,255,0.04);
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }

  tbody tr { transition: background 0.15s; }
  tbody tr:hover td { background: rgba(255,255,255,0.03); color: var(--text-primary); }

  td.name-cell { color: var(--text-primary); font-weight: 400; white-space: nowrap; }

  td.email-cell {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
  }

  td.email-cell a {
    color: rgba(100,160,255,0.85);
    text-decoration: none;
    transition: color 0.15s;
  }

  td.email-cell a:hover { color: #78aaff; text-decoration: underline; }

  .th-check, .td-check {
    width: 48px;
    text-align: center;
    vertical-align: middle;
  }

  input.contact-done {
    width: 18px;
    height: 18px;
    min-width: 18px;
    min-height: 18px;
    margin: 0;
    accent-color: var(--accent);
    cursor: pointer;
    opacity: 1;
    vertical-align: middle;
    -webkit-appearance: checkbox;
    appearance: auto;
  }

  input.contact-done-disabled {
    cursor: not-allowed;
    opacity: 0.35;
  }

  .tier-pill {
    display: inline-block;
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    padding: 2px 6px;
    border-radius: 6px;
    background: rgba(255,124,56,0.15);
    color: var(--accent);
    border: 0.5px solid rgba(255,124,56,0.35);
    min-width: 2rem;
    text-align: center;
  }

  .track-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 0.58rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    white-space: nowrap;
    border: 0.5px solid;
    max-width: 260px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .tb-1 { background: rgba(255,124,56,0.12); color: #ffb38a; border-color: rgba(255,124,56,0.3); }
  .tb-2 { background: rgba(60,180,220,0.12); color: #7dd3f5; border-color: rgba(60,180,220,0.28); }
  .tb-3 { background: rgba(240,200,80,0.12); color: #f5df8a; border-color: rgba(240,200,80,0.28); }
  .tb-4 { background: rgba(140,100,255,0.12); color: #c4b5ff; border-color: rgba(140,100,255,0.3); }
  .tb-5 { background: rgba(255,160,90,0.1); color: #ffcc99; border-color: rgba(255,160,90,0.28); }
  .tb-6 { background: rgba(80,200,130,0.1); color: #8feeb8; border-color: rgba(80,200,130,0.28); }
  .tb-7 { background: rgba(255,100,160,0.1); color: #ffaac8; border-color: rgba(255,100,160,0.28); }
  .tb-8 { background: rgba(100,220,140,0.1); color: #9af0bc; border-color: rgba(100,220,140,0.26); }
  .tb-9 { background: rgba(255,90,90,0.1); color: #ff9e9e; border-color: rgba(255,90,90,0.28); }
  .tb-0 { background: rgba(255,255,255,0.06); color: var(--text-secondary); border-color: var(--glass-border); }

  .conf-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }

  .conf-high .conf-dot { background: #4cd97b; }
  .conf-medium .conf-dot { background: #f0b429; }
  .conf-low .conf-dot { background: #888; }

  .conf-text {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    vertical-align: middle;
  }

  .conf-high .conf-text { color: #4cd97b; }
  .conf-medium .conf-text { color: #f0b429; }
  .conf-low .conf-text { color: #666; }

  .phone-cell { color: var(--text-muted); font-size: 0.68rem; }

  .empty {
    padding: 3rem;
    text-align: center;
    color: var(--text-muted);
    font-size: 0.8rem;
    letter-spacing: 0.05em;
  }

  .export-btn {
    height: 38px;
    padding: 0 18px;
    border-radius: var(--radius-sm);
    border: 0.5px solid rgba(255,124,56,0.4);
    background: var(--accent-soft);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.07em;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }

  .export-btn:hover { background: rgba(255,124,56,0.28); }

  .results-count {
    font-size: 0.68rem;
    color: var(--text-muted);
    margin-left: auto;
    letter-spacing: 0.05em;
  }

  /* Biryani Blitz re-skin + no glass + typography direction */
  body { cursor: none; }
  body::before {
    transform: translate(calc(var(--px, 0) * -8px), calc(var(--py, 0) * -8px));
    transition: transform 0.12s linear;
    background:
      radial-gradient(ellipse 60% 50% at 14% 20%, rgba(255, 238, 222, 0.18), transparent 62%),
      radial-gradient(ellipse 60% 50% at 84% 78%, rgba(250, 173, 117, 0.35), transparent 60%),
      linear-gradient(150deg, #a14123 0%, #cd4d27 45%, #f15e22 100%);
  }
  body::after {
    content: '';
    position: fixed;
    inset: -10%;
    pointer-events: none;
    z-index: 0;
    transform: translate(calc(var(--px, 0) * 10px), calc(var(--py, 0) * 10px));
    transition: transform 0.15s linear;
    background: radial-gradient(ellipse 45% 35% at 50% 55%, rgba(255, 238, 222, 0.12), transparent 70%);
  }
  h1, .uni-name {
    font-family: var(--font-exo);
    font-style: italic;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-stretch: expanded;
  }
  h1 span, .stat-label, .filter-btn {
    font-family: var(--font-cno);
    font-style: italic;
    font-stretch: condensed;
  }
  .stat-num, .results-count, .uni-count, .track-badge, .tier-pill {
    font-family: var(--font-ex);
  }
  input[type="search"], select, th, td, .copy-email-btn {
    font-family: var(--font-cno);
    font-style: italic;
  }
  .stat-cell, .university-header, .contacts-wrap, input[type="search"], select, .filter-btn, .export-btn {
    backdrop-filter: none !important;
    -webkit-backdrop-filter: none !important;
    box-shadow: none !important;
    background: #2a140d !important;
  }
  .wrapper { z-index: 1; }
  .cursor-ring {
    position: fixed;
    left: 0;
    top: 0;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 2000;
    border-radius: 999px;
  }
  .cursor-ring {
    width: 26px;
    height: 26px;
    border: 2px solid #ffeede;
    background: rgba(255, 238, 222, 0.16);
    box-shadow: 0 0 14px rgba(255, 238, 222, 0.45);
  }
</style>
</head>
<body>
<div class="cursor-ring" id="cursorRing"></div>
<div class="wrapper">

  <header>
    <div class="brand">
      <img class="logo-mark" src="/img/biryani-blitz-logo-light.png" alt="Biryani Blitz logo" />
      <h1>
        <span>Biryani Blitz</span>
        Outreach Dashboard
      </h1>
      <span class="build-tag">build 1a79563</span>
    </div>
    <a href="/" style="color: #ff7c38; font-size: 0.75rem; margin-right: 0.75rem; text-decoration: none; font-family: inherit;">← Chat &amp; tracker</a>
    <button class="export-btn" id="exportBtn" type="button" onclick="exportCSV()">Export CSV</button>
  </header>

  <div class="stats-bar" id="statsBar">
    <div class="stat-cell"><div class="stat-num stat-ratio" id="statTotal">—</div><div class="stat-label">Total contacted</div></div>
    <div class="stat-cell"><div class="stat-num" id="statUniversities">—</div><div class="stat-label">Universities</div></div>
    <div class="stat-cell"><div class="stat-num" id="statHigh">—</div><div class="stat-label">High conf.</div></div>
    <div class="stat-cell tier-stat" title="T1 — contacted / total in tier"><div class="stat-num stat-ratio" id="statT1">—</div><div class="stat-label">T1</div></div>
    <div class="stat-cell tier-stat" title="T2 — contacted / total in tier"><div class="stat-num stat-ratio" id="statT2">—</div><div class="stat-label">T2</div></div>
    <div class="stat-cell tier-stat" title="T3 — contacted / total in tier"><div class="stat-num stat-ratio" id="statT3">—</div><div class="stat-label">T3</div></div>
    <div class="stat-cell tier-stat" title="T4 — contacted / total in tier"><div class="stat-num stat-ratio" id="statT4">—</div><div class="stat-label">T4</div></div>
    <div class="stat-cell tier-stat" title="T5 — contacted / total in tier"><div class="stat-num stat-ratio" id="statT5">—</div><div class="stat-label">T5</div></div>
    <div class="stat-cell tier-stat" title="T6 — contacted / total in tier"><div class="stat-num stat-ratio" id="statT6">—</div><div class="stat-label">T6</div></div>
    <div class="stat-cell tier-stat" title="T7 — contacted / total in tier"><div class="stat-num stat-ratio" id="statT7">—</div><div class="stat-label">T7</div></div>
    <div class="stat-cell tier-stat" title="T8 — contacted / total in tier"><div class="stat-num stat-ratio" id="statT8">—</div><div class="stat-label">T8</div></div>
    <div class="stat-cell tier-stat" title="T9 — contacted / total in tier"><div class="stat-num stat-ratio" id="statT9">—</div><div class="stat-label">T9</div></div>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="6.5" cy="6.5" r="4.5"/><path d="M10.5 10.5L14 14"/>
      </svg>
      <input type="search" id="searchInput" placeholder="Search name, title, email, track…" oninput="render()">
    </div>
    <select id="tierFilter" onchange="render()">
      <option value="">All tiers</option>
      <option value="1">T1 — Student Union / Commercial</option>
      <option value="2">T2 — Student Life / Experience</option>
      <option value="3">T3 — Student Government</option>
      <option value="4">T4 — Entrepreneurship</option>
      <option value="5">T5 — Cultural / South Asian</option>
      <option value="6">T6 — Sustainability lists</option>
      <option value="7">T7 — Food truck / mobile</option>
      <option value="8">T8 — Campus dining</option>
      <option value="9">T9 — EHS / food safety</option>
    </select>
    <select id="confFilter" onchange="render()">
      <option value="">All confidence</option>
      <option value="high">High</option>
      <option value="medium">Medium</option>
      <option value="low">Low</option>
    </select>
    <select id="contactedFilter" onchange="render()">
      <option value="">Contacted: all</option>
      <option value="yes">Contacted only</option>
      <option value="no">Not contacted</option>
    </select>
    <button class="filter-btn" id="btnCollapse" type="button" onclick="toggleAll(false)">Collapse all</button>
    <button class="filter-btn" type="button" onclick="toggleAll(true)">Expand all</button>
    <span class="results-count" id="resultsCount"></span>
  </div>

  <div id="mainTable"></div>
</div>

<script>
let allContacts = [];
let collapsedState = {};
let uniRankMap = {};
/** @type {Record<string, boolean>} */
let contactChecks = {};
let checkSaveTimer = null;

/** Unique key for Done checkbox + persistence: real email when present, else university+name. */
function stableContactKey(c) {
  const raw = c.email ?? c.Email ?? '';
  const e = String(raw).toLowerCase().trim();
  if (e && e !== 'null' && e !== 'n/a' && e.includes('@')) {
    return e;
  }
  const uni = String(c.university ?? '').trim();
  const name = String(c.name ?? '').trim();
  if (!uni && !name) return '';
  return '__row__:' + JSON.stringify([uni, name]);
}

function normalizeChecks(raw) {
  const out = {};
  if (!raw || typeof raw !== 'object') return out;
  for (const [k, v] of Object.entries(raw)) {
    let key = String(k).trim();
    if (!key) continue;
    if (key.includes('@')) key = key.toLowerCase();
    out[key] = typeof v === 'object' && v !== null ? !!v.contacted : !!v;
  }
  return out;
}

function parseTier(val) {
  const n = parseInt(String(val), 10);
  return (n >= 1 && n <= 9) ? n : 0;
}

function normalizeContact(raw) {
  const tier = parseTier(raw.tier);
  const tier_label = raw.tier_label || '';
  const email = raw.email ?? raw.Email ?? raw['E-mail'] ?? '';
  return {
    ...raw,
    email,
    tier,
    tier_label,
    department: raw.department || '',
    confidence: raw.confidence || 'low',
  };
}

function persistChecks() {
  try {
    localStorage.setItem('bb_contact_checks_v1', JSON.stringify(contactChecks));
  } catch (_) {}
  clearTimeout(checkSaveTimer);
  checkSaveTimer = setTimeout(() => {
    fetch('/api/contact-checks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(contactChecks),
    }).catch(() => {});
  }, 400);
}

function onContactCheckChange(e) {
  const t = e.target;
  if (!t.classList || !t.classList.contains('contact-done')) return;
  const raw = t.getAttribute('data-contact-key');
  if (!raw) return;
  let key;
  try {
    key = decodeURIComponent(raw);
  } catch {
    return;
  }
  if (key.includes('@')) key = key.toLowerCase().trim();
  if (t.checked) contactChecks[key] = true;
  else delete contactChecks[key];
  persistChecks();
  updateStats();
  render();
}

/** x = rows with Done checked; y = rows in the set (tiers) or all rows (Total). */
function contactedRatio(contacts) {
  const y = contacts.length;
  const x = contacts.filter((c) => {
    const k = stableContactKey(c);
    return k && contactChecks[k];
  }).length;
  if (y === 0) return '0/0';
  return `${x}/${y}`;
}

function updateStats() {
  const unis = new Set(allContacts.map((c) => c.university)).size;
  const high = allContacts.filter((c) => c.confidence === 'high').length;

  document.getElementById('statTotal').textContent = contactedRatio(allContacts);
  document.getElementById('statUniversities').textContent = unis;
  document.getElementById('statHigh').textContent = high;
  for (let t = 1; t <= 9; t++) {
    const inTier = allContacts.filter((c) => parseTier(c.tier) === t);
    document.getElementById('statT' + t).textContent = contactedRatio(inTier);
  }
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const tier = document.getElementById('tierFilter').value;
  const conf = document.getElementById('confFilter').value;
  const contactedFilter = document.getElementById('contactedFilter').value;

  return allContacts.filter(c => {
    if (tier && String(parseTier(c.tier)) !== tier) return false;
    if (conf && c.confidence !== conf) return false;
    const ck = stableContactKey(c);
    const done = ck && contactChecks[ck];
    if (contactedFilter === 'yes' && !done) return false;
    if (contactedFilter === 'no' && done) return false;
    if (q) {
      const hay = [c.name, c.title, c.email, c.university, c.department, c.phone, c.tier_label].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function groupByUniversity(contacts) {
  const map = {};
  contacts.forEach(c => {
    const key = c.university || 'Unknown';
    if (!map[key]) map[key] = [];
    map[key].push(c);
  });
  return map;
}

function trackClass(tier) {
  const t = parseTier(tier);
  return 'track-badge tb-' + (t || 0);
}

function tierPill(tier) {
  const t = parseTier(tier);
  if (!t) return '—';
  return `<span class="tier-pill">T${t}</span>`;
}

function escapeHtml(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function firstContactName(contacts) {
  for (const c of contacts) {
    const n = String(c?.name || '').trim();
    if (n && n !== '—') return n;
  }
  return 'there';
}

function firstContactEmail(contacts) {
  for (const c of contacts) {
    const e = String(c?.email || '').trim();
    if (e && e.includes('@')) return e;
  }
  return '';
}

function buildUniversityEmailDraft(uniName, contacts) {
  const university = String(uniName || 'your university').trim();
  const name = firstContactName(contacts);
  const email = firstContactEmail(contacts);
  const subject = `Subject: Student-led venture: Bringing Biryani Blitz to ${university}`;
  const toLine = email ? `To: ${email}\n` : '';
  return `${toLine}${subject}

Hi ${name},

My name is Neal Parekh (UNC Chapel Hill), and I’m reaching out with my co-founder, Sidhya Ganesh (UPenn). We’re the founders of Biryani Blitz, a hot-food vending company designed by students, for students.

After conducting nearly 200 student interviews, we found that over 70% of students struggle to find healthy, hot meals that fit into 15-minute windows between classes. However, Biryani Blitz provides a way for students to get quick, filling, healthy, tasty, and conveniently located biryani (a protein-filled Indian rice dish) all for $10.

We were recently slated to launch our first unit at UC Berkeley, but due to unexpected electrical constraints there, we are looking for a new "home base" campus.

We’re looking for a high-traffic spot at ${university} where students need quick, late-night, or healthy options. We handle the entire operation from installation to maintenance to and restocking, and offer a revenue-share model for the university.

I’ve attached a one-pager with the machine's technical specs and student testimonials. Would you be open to a 10-minute chat next week to see if we might be a fit for your campus?

Best,

Neal Parekh | UNC Chapel Hill
Sidhya Ganesh | University of Pennsylvania`;
}

async function copyUniversityEmail(ev, uniName) {
  ev.stopPropagation();
  const grouped = groupByUniversity(getFiltered());
  const contacts = grouped[uniName] || [];
  const draft = buildUniversityEmailDraft(uniName, contacts);
  try {
    await navigator.clipboard.writeText(draft);
    alert(`Copied email draft for ${uniName}`);
  } catch {
    const ta = document.createElement('textarea');
    ta.value = draft;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert(`Copied email draft for ${uniName}`);
  }
}

function render() {
  const filtered = getFiltered();
  const grouped = groupByUniversity(filtered);
  const uniNames = Object.keys(grouped).sort();
  const container = document.getElementById('mainTable');

  document.getElementById('resultsCount').textContent =
    filtered.length !== allContacts.length
      ? `${filtered.length} of ${allContacts.length} contacts`
      : `${allContacts.length} contacts`;

  if (allContacts.length === 0) {
    container.innerHTML = '<div class="empty">No contacts yet. Run a scrape from the <a href="/" style="color:var(--accent)">chat</a> — results load here automatically when the job writes to the server.</div>';
    return;
  }

  if (uniNames.length === 0) {
    container.innerHTML = '<div class="empty">No contacts match your filters</div>';
    return;
  }

  let rank = 1;
  container.innerHTML = uniNames.map(uniName => {
    const contacts = grouped[uniName];
    const collapsed = collapsedState[uniName] === true;
    const r = uniRankMap[uniName] || (uniRankMap[uniName] = rank++);

    const rows = contacts.map(c => {
      const confClass = `conf-${c.confidence || 'low'}`;
      const emailHtml = c.email
        ? `<a href="mailto:${escapeHtml(c.email)}">${escapeHtml(c.email)}</a>`
        : '<span style="opacity:0.3">—</span>';
      const phoneHtml = c.phone && c.phone !== 'null'
        ? `<span class="phone-cell">${escapeHtml(c.phone)}</span>`
        : '<span style="opacity:0.2">—</span>';
      const label = c.tier_label || '—';
      const ck = stableContactKey(c);
      const checked = ck && contactChecks[ck] ? ' checked' : '';
      const checkCell = ck
        ? `<td class="td-check"><input type="checkbox" class="contact-done" data-contact-key="${encodeURIComponent(ck)}" aria-label="Marked as contacted"${checked} /></td>`
        : '<td class="td-check"><input type="checkbox" class="contact-done contact-done-disabled" disabled title="No name or university on this row" aria-label="Cannot mark — missing row id" /></td>';

      return `<tr>
        ${checkCell}
        <td>${tierPill(c.tier)}</td>
        <td class="name-cell">${escapeHtml(c.name) || '—'}</td>
        <td>${escapeHtml(c.title) || '—'}</td>
        <td><span class="${trackClass(c.tier)}">${escapeHtml(label)}</span></td>
        <td class="email-cell">${emailHtml}</td>
        <td>${phoneHtml}</td>
        <td><span class="${confClass}"><span class="conf-dot"></span><span class="conf-text">${escapeHtml(c.confidence) || '—'}</span></span></td>
      </tr>`;
    }).join('');

    const safeKey = uniName.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    return `<div class="university-section${collapsed ? ' collapsed' : ''}" data-uni="${escapeHtml(uniName)}">
      <div class="university-header" onclick="toggleSection('${safeKey}')">
        <span class="uni-rank">#${String(r).padStart(2,'0')}</span>
        <span class="uni-name">${escapeHtml(uniName)}</span>
        <span class="uni-city"></span>
        <span class="uni-count">${contacts.length} contact${contacts.length !== 1 ? 's' : ''}</span>
        <button type="button" class="copy-email-btn" onclick="copyUniversityEmail(event, '${safeKey}')">Copy email</button>
        <svg class="chevron" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M3 5l4 4 4-4"/>
        </svg>
      </div>
      <div class="contacts-wrap">
        <table>
          <thead><tr>
            <th class="th-check" title="You’ve reached out">Done</th>
            <th>Tier</th><th>Name</th><th>Title</th><th>Track</th>
            <th>Email</th><th>Phone</th><th>Conf.</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  }).join('');
}

function toggleSection(uniName) {
  collapsedState[uniName] = !collapsedState[uniName];
  render();
}

function toggleAll(expand) {
  const filtered = getFiltered();
  const grouped = groupByUniversity(filtered);
  Object.keys(grouped).forEach(u => { collapsedState[u] = !expand; });
  render();
}

function exportCSV() {
  const filtered = getFiltered();
  if (!filtered.length) return;
  const headers = ['university','tier','tier_label','name','title','department','email','phone','confidence','source_url','contacted'];
  const esc = v => `"${String(v ?? '').replace(/"/g,'""')}"`;
  const rows = [headers.join(','), ...filtered.map(c => {
    const row = headers.map(h => {
      if (h === 'contacted') {
        const k = stableContactKey(c);
        return esc(k && contactChecks[k] ? 'yes' : '');
      }
      return esc(c[h]);
    });
    return row.join(',');
  })];
  const blob = new Blob([rows.join('\n')], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'biryani_blitz_contacts.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

function contactListSignature(list) {
  return list
    .map((c) => stableContactKey(c))
    .filter(Boolean)
    .sort()
    .join('|');
}

async function pullContactsFromServer() {
  const r = await fetch('/api/contacts');
  if (!r.ok) return;
  const data = await r.json();
  if (!Array.isArray(data)) return;
  const next = data.map(normalizeContact);
  if (contactListSignature(next) === contactListSignature(allContacts) && next.length === allContacts.length) {
    return;
  }
  allContacts = next;
  updateStats();
  render();
}

async function bootstrap() {
  contactChecks = {};
  try {
    const ls = localStorage.getItem('bb_contact_checks_v1');
    if (ls) Object.assign(contactChecks, normalizeChecks(JSON.parse(ls)));
  } catch (_) {}
  try {
    const r = await fetch('/api/contact-checks');
    if (r.ok) Object.assign(contactChecks, normalizeChecks(await r.json()));
  } catch (_) {}
  try {
    await pullContactsFromServer();
  } catch (_) {}
  document.getElementById('mainTable').addEventListener('change', onContactCheckChange);
  updateStats();
  render();
  setInterval(() => {
    pullContactsFromServer().catch(() => {});
  }, 8000);
}

bootstrap();

(() => {
  const embeddedByQuery = new URLSearchParams(window.location.search).get('embedded') === '1';
  const embedded = embeddedByQuery || window.top !== window.self;
  const ring = document.getElementById('cursorRing');
  if (embedded) {
    if (ring) ring.remove();
    document.body.style.cursor = 'none';
    document.documentElement.style.cursor = 'none';
    window.addEventListener('mousemove', (e) => {
      window.parent.postMessage(
        {
          type: 'bb-cursor-move',
          x: e.clientX,
          y: e.clientY,
        },
        '*'
      );
      const px = (e.clientX / window.innerWidth - 0.5) * 2;
      const py = (e.clientY / window.innerHeight - 0.5) * 2;
      document.body.style.setProperty('--px', String(px));
      document.body.style.setProperty('--py', String(py));
    });
    return;
  }
  let tx = window.innerWidth / 2;
  let ty = window.innerHeight / 2;
  let rx = tx, ry = ty;
  window.addEventListener('mousemove', (e) => {
    tx = e.clientX;
    ty = e.clientY;
    const px = (e.clientX / window.innerWidth - 0.5) * 2;
    const py = (e.clientY / window.innerHeight - 0.5) * 2;
    document.body.style.setProperty('--px', String(px));
    document.body.style.setProperty('--py', String(py));
  });
  const tick = () => {
    rx += (tx - rx) * 0.14;
    ry += (ty - ry) * 0.14;
    ring.style.left = `${rx}px`;
    ring.style.top = `${ry}px`;
    requestAnimationFrame(tick);
  };
  tick();
})();
</script>
