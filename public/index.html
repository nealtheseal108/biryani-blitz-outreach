<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biryani Blitz — Outreach</title>
  <link rel="stylesheet" href="/css/theme.css" />
  <style>
    :root {
      --bg: #0a0c12;
      --glass: var(--glass-surface);
      --glass-strong: rgba(255, 255, 255, 0.34);
      --accent: #ff7c38;
      --accent-dim: rgba(255, 124, 56, 0.2);
      --text: rgba(255, 255, 255, 0.94);
      --muted: rgba(255, 255, 255, 0.5);
      --user-bubble: var(--glass-accent);
      --bot-bubble: var(--glass-surface-soft);
      --radius: 18px;
      --radius-sm: 12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 85% 65% at 12% 18%, rgba(255, 95, 45, 0.42), transparent 58%),
        radial-gradient(ellipse 70% 55% at 88% 12%, rgba(210, 55, 95, 0.32), transparent 52%),
        radial-gradient(ellipse 75% 70% at 92% 88%, rgba(55, 35, 120, 0.45), transparent 55%),
        radial-gradient(ellipse 55% 45% at 45% 92%, rgba(255, 150, 70, 0.2), transparent 50%),
        var(--bg);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 1680px;
      margin: 0 auto;
      padding: 0.75rem 1rem 1rem;
    }

    .workspace {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(440px, 1fr) minmax(520px, 1.15fr);
      gap: 0.85rem;
    }

    .request-pane,
    .data-pane {
      min-height: 0;
      border-radius: var(--radius);
      border: 1px solid var(--glass-border);
      background: var(--glass-surface);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      box-shadow: var(--glass-inset), 0 8px 32px rgba(0, 0, 0, 0.12);
      overflow: hidden;
    }

    .request-pane {
      display: flex;
      flex-direction: column;
      padding: 0 0.9rem 0.8rem;
    }

    .data-pane {
      display: flex;
      flex-direction: column;
    }

    .data-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.6rem;
      padding: 0.8rem 0.95rem;
      border-bottom: 1px solid var(--glass-border);
      background: #2a140d;
    }

    .data-head h2 {
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
    }

    .data-head a {
      font-size: 0.72rem;
      color: var(--text);
      text-decoration: none;
      opacity: 0.85;
    }

    .data-head a:hover { opacity: 1; color: var(--accent); }

    .data-frame {
      width: 100%;
      flex: 1;
      border: 0;
      background: transparent;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.5rem 0 0.75rem;
      border-bottom: 1px solid var(--glass-border);
      margin-bottom: 0.5rem;
    }
    .brand-head {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .brand-head img {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      border: 1px solid rgba(255, 238, 222, 0.5);
      background: #ffeede;
      flex-shrink: 0;
    }
    .build-tag {
      font-family: var(--font-cno);
      font-style: italic;
      font-size: 0.64rem;
      color: #fdc99f;
      opacity: 0.85;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-left: 0.55rem;
      white-space: nowrap;
    }
    header h1 {
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    header h1 span {
      display: block;
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.15rem;
    }

    .request-body {
      flex: 1;
      overflow-y: auto;
      padding-top: 0.6rem;
      min-height: 0;
    }

    .panel {
      border-radius: var(--radius);
      border: 1px solid var(--glass-border);
      background: var(--glass-surface);
      padding: 1rem 1.1rem;
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      box-shadow: var(--glass-inset), 0 8px 32px rgba(0, 0, 0, 0.12);
    }

    .tier-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.45rem;
      margin-top: 0.65rem;
    }
    .tier-item {
      display: flex;
      align-items: flex-start;
      gap: 0.45rem;
      font-family: var(--font-ex);
      font-size: 0.72rem;
      font-weight: 500;
      line-height: 1.35;
      color: var(--muted);
      cursor: pointer;
      padding: 0.35rem 0.25rem;
      border-radius: var(--radius-sm);
      transition: background 0.15s;
    }
    .tier-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .tier-item input { accent-color: var(--accent); margin-top: 0.15rem; flex-shrink: 0; }
    .tier-item strong {
      font-family: var(--font-ex);
      color: var(--text);
      font-weight: 700;
    }
    .tier-item .tier-item-cat {
      font-family: var(--font-ex);
      font-weight: 500;
      color: var(--text);
    }
    .tier-item .tier-item-sub {
      font-family: var(--font-exo);
      font-weight: 300;
      font-style: normal;
      display: block;
      margin-top: 0.15rem;
      opacity: 0.78;
      letter-spacing: 0.03em;
    }

    label.field {
      display: block;
      font-size: 0.58rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin: 0.65rem 0 0.35rem;
      font-weight: 600;
    }
    textarea, input[type="text"], input[type="password"], input[type="number"], input[type="search"] {
      width: 100%;
      font-family: var(--font);
      font-size: 0.82rem;
      padding: 0.65rem 0.75rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--glass-border);
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--text);
      outline: none;
    }
    textarea:focus, input:focus {
      border-color: rgba(255,124,56,0.45);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    textarea { min-height: 88px; resize: vertical; }

    .row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.65rem;
    }
    @media (max-width: 560px) { .row2 { grid-template-columns: 1fr; } }

    .toggle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: var(--muted);
      margin: 0.5rem 0;
      cursor: pointer;
    }
    .toggle input { accent-color: var(--accent); width: 1rem; height: 1rem; }

    .composer {
      border-top: 1px solid var(--glass-border);
      padding-top: 0.75rem;
      background: linear-gradient(180deg, transparent, rgba(8, 10, 14, 0.55) 35%);
    }
    .composer-inner {
      border-radius: var(--radius);
      border: 1px solid var(--glass-border);
      background: var(--glass-strong);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      box-shadow: var(--glass-inset), 0 12px 40px rgba(0, 0, 0, 0.15);
      padding: 0.85rem 1rem 1rem;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.75rem;
      align-items: center;
    }
    button.primary {
      font-family: var(--font);
      font-size: 0.82rem;
      font-weight: 600;
      padding: 0.55rem 1.25rem;
      border-radius: 999px;
      border: 1px solid #cd4d27;
      background: #f15e22;
      color: #fff;
      cursor: pointer;
      box-shadow: none;
    }
    button.primary:hover:not(:disabled) { background: #f78f38; border-color: #f78f38; }
    button.primary:disabled { opacity: 0.45; cursor: not-allowed; }
    button.ghost {
      font-family: var(--font);
      font-size: 0.78rem;
      padding: 0.5rem 1rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 238, 222, 0.22);
      background: #4b2216;
      color: var(--text);
      cursor: pointer;
      box-shadow: none;
    }
    button.ghost:hover:not(:disabled) { background: #5c2a1c; border-color: rgba(255, 238, 222, 0.35); }

    .status {
      font-size: 0.72rem;
      color: var(--muted);
      flex: 1;
      min-width: 140px;
    }
    .status strong { color: #8ee4a8; font-weight: 600; }
    .eta-status {
      flex: 0 0 auto;
      min-width: 170px;
      text-align: right;
      color: rgba(255, 255, 255, 0.68);
    }

    .log-preview {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.62rem;
      color: var(--muted);
      max-height: 100px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      margin-top: 0.5rem;
      padding: 0.5rem;
      border-radius: var(--radius-sm);
      background: rgba(0, 0, 0, 0.18);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    @media (max-width: 1200px) {
      .workspace { grid-template-columns: 1fr; }
      .request-pane { min-height: 58vh; }
      .data-pane { min-height: 58vh; }
    }

    /* Biryani Blitz re-skin: no glass, warm palette, italic/wide/condensed emphasis */
    :root {
      --bg: #a14123;
      --accent: #f15e22;
      --accent-dim: rgba(241, 94, 34, 0.22);
      --text: #ffeede;
      --muted: #fdc99f;
    }
    body {
      cursor: none;
      background: linear-gradient(140deg, #a14123 0%, #cd4d27 40%, #f15e22 100%);
    }
    body::before {
      transform: translate(calc(var(--px, 0) * -8px), calc(var(--py, 0) * -8px));
      transition: transform 0.12s linear;
      background:
        radial-gradient(ellipse 60% 50% at 14% 20%, rgba(255, 238, 222, 0.18), transparent 62%),
        radial-gradient(ellipse 60% 50% at 84% 78%, rgba(250, 173, 117, 0.35), transparent 60%),
        linear-gradient(150deg, #a14123 0%, #cd4d27 45%, #f15e22 100%);
    }
    body::after {
      content: "";
      position: fixed;
      inset: -10%;
      pointer-events: none;
      z-index: 0;
      transform: translate(calc(var(--px, 0) * 10px), calc(var(--py, 0) * 10px));
      transition: transform 0.15s linear;
      background: radial-gradient(ellipse 45% 35% at 50% 55%, rgba(255, 238, 222, 0.12), transparent 70%);
    }
    header h1 {
      font-family: var(--font-exo);
      font-style: italic;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      font-stretch: expanded;
    }
    header h1 span,
    label.field {
      font-family: var(--font-cno);
      font-style: italic;
      font-stretch: condensed;
      letter-spacing: 0.16em;
    }
    .data-head h2,
    .status,
    .eta-status,
    .toggle {
      font-family: var(--font-cno);
      font-style: italic;
    }
    .actions button {
      font-family: var(--font-ex);
      letter-spacing: 0.06em;
    }
    .request-pane, .data-pane, .panel, .composer-inner {
      background: #2a140d !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.24) !important;
    }
    textarea, input[type="text"], input[type="password"], input[type="number"], input[type="search"] {
      background: #1f0f0a !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
    }
    button.ghost {
      background: #4b2216 !important;
      border-color: rgba(255, 238, 222, 0.22) !important;
      box-shadow: none !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
    }
    button.primary {
      background: #f15e22 !important;
      border-color: #cd4d27 !important;
      box-shadow: none !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
    }
    .cursor-ring {
      position: fixed;
      left: 0;
      top: 0;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 2000;
      border-radius: 999px;
    }
    .cursor-ring {
      width: 26px;
      height: 26px;
      border: 2px solid #ffeede;
      background: rgba(255, 238, 222, 0.16);
      box-shadow: 0 0 14px rgba(255, 238, 222, 0.45);
      transition: opacity 0.12s ease;
    }
  </style>
</head>
<body>
  <div class="cursor-ring" id="cursorRing"></div>
  <div class="app">
    <header>
      <div class="brand-head">
        <img src="/img/biryani-blitz-logo-light.png" alt="Biryani Blitz logo" />
        <h1><span>Biryani Blitz</span>Outreach assistant</h1>
        <span class="build-tag">build 1a79563</span>
      </div>
    </header>

    <div class="workspace">
      <section class="request-pane">
        <div class="request-body">
          <div class="composer">
            <div class="composer-inner panel">
              <div style="font-size:0.62rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--accent);margin-bottom:0.45rem;font-weight:600;">Configure run</div>
              <p style="font-size:0.8rem;color:var(--muted);margin-bottom:0.75rem;">
                Paste <strong>school names only</strong>, one per line. Tick <strong>categories</strong>, then run.
              </p>

              <label class="toggle">
                <input type="checkbox" id="useBuiltIn" />
                Use built-in 70-school list (ignores CSV)
              </label>

              <label class="field">Schools (one per line)</label>
              <textarea id="schoolsCsv" placeholder="University of North Carolina at Chapel Hill
New York University
UC Berkeley"></textarea>

              <label class="field">Contact categories</label>
              <div class="tier-grid" id="tierGrid"></div>

              <div class="actions">
                <button type="button" class="primary" id="btnSend">Send &amp; run</button>
                <button type="button" class="ghost" id="btnStop" disabled>Stop</button>
                <span class="status" id="statusLine">…</span>
                <span class="status eta-status" id="etaLine">ETA: —</span>
              </div>
              <div class="log-preview" id="logPreview"></div>
            </div>
          </div>
        </div>
      </section>

      <section class="data-pane" aria-label="Contacts dashboard">
        <div class="data-head">
          <h2>Data dashboard</h2>
          <a href="/contacts.html" target="_blank" rel="noopener noreferrer">Open full view ↗</a>
        </div>
        <iframe class="data-frame" src="/contacts.html?embedded=1" title="Contacts dashboard"></iframe>
      </section>
    </div>
  </div>

  <script>
    const TIERS = [
      [1, "Student Union / commercial", "Vendor & contract gatekeepers"],
      [2, "Student life / experience", "VP / director-level"],
      [3, "Student government", "Board / advocacy"],
      [4, "Entrepreneurship", "Venture centers"],
      [5, "Cultural / South Asian", "Multicultural affairs"],
      [6, "Sustainability", "Green vendor lists"],
      [7, "Food truck / mobile", "Union coordinators"],
      [8, "Campus dining", "Auxiliary dining"],
      [9, "EHS / food safety", "Permits & compliance"],
    ];

    const grid = document.getElementById("tierGrid");
    TIERS.forEach(([n, title, sub]) => {
      const id = "t" + n;
      const lab = document.createElement("label");
      lab.className = "tier-item";
      lab.innerHTML = `<input type="checkbox" id="${id}" value="${n}" checked />
        <span class="tier-item-text"><strong>C${n}</strong> — <span class="tier-item-cat">${title}</span><span class="tier-item-sub">${sub}</span></span>`;
      grid.appendChild(lab);
    });

    let lastLogLines = [];
    let runIsActive = false;
    let etaStartMs = null;
    let lastProgress = { current: 0, total: 0 };

    function parseRunProgress(lines) {
      const re = /━━\s*(\d+)\s*\/\s*(\d+)/;
      let cur = 0;
      let total = 0;
      for (const line of lines) {
        const m = line.match(re);
        if (!m) continue;
        cur = Number(m[1]) || cur;
        total = Number(m[2]) || total;
      }
      return { current: cur, total };
    }

    function formatEta(ms) {
      if (!Number.isFinite(ms) || ms < 0) return "—";
      const s = Math.round(ms / 1000);
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      if (h > 0) return `${h}h ${m}m`;
      if (m > 0) return `${m}m ${sec}s`;
      return `${sec}s`;
    }

    function updateEtaDisplay() {
      const etaEl = document.getElementById("etaLine");
      if (!runIsActive) {
        etaStartMs = null;
        lastProgress = { current: 0, total: 0 };
        etaEl.textContent = "ETA: —";
        return;
      }
      const p = parseRunProgress(lastLogLines);
      if (!p.total || p.current <= 0) {
        etaEl.textContent = "ETA: gathering URLs…";
        return;
      }
      // On single-school runs, progress can reach 1/1 long before the process exits.
      // Avoid misleading "ETA: ~0s" while still actively scraping/extracting.
      if (p.current >= p.total) {
        etaEl.textContent = "ETA: finalizing…";
        return;
      }
      if (!etaStartMs || p.current !== lastProgress.current || p.total !== lastProgress.total) {
        if (!etaStartMs) etaStartMs = Date.now();
        lastProgress = p;
      }
      const elapsed = Date.now() - etaStartMs;
      const perSchoolMs = elapsed / Math.max(1, p.current);
      const remaining = Math.max(0, p.total - p.current);
      const etaMs = perSchoolMs * remaining;
      etaEl.textContent = `ETA: ~${formatEta(etaMs)} (${p.current}/${p.total})`;
    }

    async function refreshStatus() {
      try {
        const r = await fetch("/api/status");
        const j = await r.json();
        const run = j.running ? "Running (pid " + j.pid + ")" : "Idle";
        const k = j.hasKey ? "GOOGLE_API_KEY set on server" : "Set GOOGLE_API_KEY on the server (e.g. Render env)";
        document.getElementById("statusLine").innerHTML = "Status: <strong>" + run + "</strong> · " + k;
        document.getElementById("btnSend").disabled = j.running;
        document.getElementById("btnStop").disabled = !j.running;
        runIsActive = !!j.running;
        updateEtaDisplay();
      } catch {
        document.getElementById("statusLine").textContent = "Cannot reach API — is the server running?";
        runIsActive = false;
        updateEtaDisplay();
      }
    }

    async function refreshLogs() {
      try {
        const r = await fetch("/api/logs");
        const j = await r.json();
        lastLogLines = j.lines || [];
        const transparent = [];
        const signal = [];
        for (const line of lastLogLines) {
          const s = String(line || "");
          const clean = s
            .replace(/\bTier filter:/g, "Category filter:")
            .replace(/\bTier URL coverage:/g, "Category URL coverage:");
          // Keep only exact scrape targets shown by the scraper: "    → https://..."
          if (/\s→\shttps?:\/\//.test(clean)) transparent.push(clean);
          // Also keep high-signal lifecycle/error lines so panel never appears silently stuck.
          if (
            /Tier filter:|LLM extraction provider:|LLM search terminology aliases:|AI university name expansion:|Multi-stage search:|campus office lookup|→ offices:|→ Canonical:|People \/ about crawl:|↪ crawl hub:|━━\s*\d+\/\d+|\[search \d+\/\d+\]|Search terminology aliases:|Scoped URLs for|Tier URL coverage:|Google:|Bing:|DuckDuckGo:|search empty;|Found \d+ page\(s\) to scrape|no result URLs|saved \d+ unique emails|Done\.|Process exited|Search failed|Gemini:|OpenRouter|quota|error|failed/i.test(
              s
            )
          ) {
            signal.push(clean);
          }
        }
        const linesToShow = transparent.length > 0 ? transparent.slice(-80) : signal.slice(-30);
        document.getElementById("logPreview").textContent = linesToShow.length
          ? linesToShow.join("\n")
          : "No scrape destinations yet. Start a run to see exact pages Playwright visits.";
        updateEtaDisplay();
      } catch { /* empty */ }
    }

    document.getElementById("btnSend").onclick = async () => {
      const tiers = [...document.querySelectorAll("#tierGrid input[type=checkbox]:checked")].map(
        (c) => parseInt(c.value, 10)
      );
      if (!tiers.length) {
        alert("Select at least one category.");
        return;
      }
      const useBuiltIn = document.getElementById("useBuiltIn").checked;
      const schoolsCsv = document.getElementById("schoolsCsv").value;
      if (!useBuiltIn && !schoolsCsv.trim()) {
        alert("Paste schools or enable the built-in list.");
        return;
      }

      const body = {
        useBuiltInList: useBuiltIn,
        schoolsCsv,
        tiers,
      };

      const res = await fetch("/api/start", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const j = await res.json().catch(() => ({}));
      if (!res.ok) {
        alert(j.error || res.statusText || "Could not start scrape run.");
        return;
      }
      document.getElementById("statusLine").innerHTML =
        "Status: <strong>Run started</strong> · Watching scrape targets below";
      refreshStatus();
    };

    document.getElementById("btnStop").onclick = async () => {
      await fetch("/api/stop", { method: "POST" });
      refreshStatus();
    };

    document.getElementById("useBuiltIn").onchange = () => {
      document.getElementById("schoolsCsv").disabled = document.getElementById("useBuiltIn").checked;
    };
    document.getElementById("schoolsCsv").disabled = false;

    refreshStatus();
    refreshLogs();
    setInterval(() => {
      refreshStatus();
      refreshLogs();
    }, 1500);

    (() => {
      const ring = document.getElementById("cursorRing");
      let tx = window.innerWidth / 2;
      let ty = window.innerHeight / 2;
      let rx = tx, ry = ty;
      window.addEventListener("mousemove", (e) => {
        tx = e.clientX;
        ty = e.clientY;
        const px = (e.clientX / window.innerWidth - 0.5) * 2;
        const py = (e.clientY / window.innerHeight - 0.5) * 2;
        document.body.style.setProperty("--px", String(px));
        document.body.style.setProperty("--py", String(py));
      });
      const frame = document.querySelector(".data-frame");
      if (frame) {
        window.addEventListener("message", (ev) => {
          const d = ev.data || {};
          if (d.type !== "bb-cursor-move") return;
          const rect = frame.getBoundingClientRect();
          tx = rect.left + Number(d.x || 0);
          ty = rect.top + Number(d.y || 0);
          const px = (tx / window.innerWidth - 0.5) * 2;
          const py = (ty / window.innerHeight - 0.5) * 2;
          document.body.style.setProperty("--px", String(px));
          document.body.style.setProperty("--py", String(py));
        });
      }
      const tick = () => {
        rx += (tx - rx) * 0.14;
        ry += (ty - ry) * 0.14;
        ring.style.left = `${rx}px`;
        ring.style.top = `${ry}px`;
        requestAnimationFrame(tick);
      };
      tick();
    })();
  </script>
</body>
</html>
